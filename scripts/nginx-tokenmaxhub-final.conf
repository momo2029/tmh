# tokenmaxhub.com 站点配置 - HTTPS 完整版
# 使用方法：
#   1. 确保 DNS 已正确解析：
#      tokenmaxhub.com     A    38.76.205.16
#      www.tokenmaxhub.com A    38.76.205.16
#   2. 申请证书：
#      certbot --nginx -d tokenmaxhub.com -d www.tokenmaxhub.com --non-interactive --agree-tos --register-unsafely-without-email --redirect
#   3. 将此文件复制到 /etc/nginx/conf.d/tokenmaxhub.conf
#   4. nginx -t && nginx -s reload

# HTTP - 重定向到 HTTPS（certbot 会自动配置）
server {
    listen 80;
    listen [::]:80;
    server_name tokenmaxhub.com www.tokenmaxhub.com;

    location / {
        proxy_pass http://127.0.0.1:3300;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
